<!DOCTYPE html>
<html>
<head>
  <title>Space Impact Clone with Power-Ups</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      touch-action: none; 
    }

    canvas {
      display: block;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    #controls > div, #controls > button {
      pointer-events: auto;
    }
    #restartBtn {
      position: absolute;
      left: 50%;
      top: 60%;
      transform: translateX(-50%);
      padding: 12px 25px;
      font-size: 18px;
      z-index: 10;
    }
    #gameOverOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(5px); 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 30px;
      text-align: center;
      z-index: 10;
      pointer-events: none; 
    }
    #gameOverOverlay button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      pointer-events: auto;
    }
    #mobileControls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      pointer-events: none; /* allow only buttons to interact */
      padding: 0 20px;
      z-index: 5;
    }

    #mobileControls button {
      width: 60px;
      height: 60px;
      font-size: 24px;
      border-radius: 10px;
      pointer-events: auto;
      opacity: 0.6;
      background-color: black;
      color: white;
    }
  </style>
</head>
<body>

<!-- <div id="controls">
  <div style="display:flex; flex-direction:column; margin-left:10px;">
    <button id="upBtn" style="width:60px; height:60px; margin-bottom:10px;">▲</button>
    <button id="downBtn" style="width:60px; height:60px;">▼</button>
  </div>
  <button id="fireBtn" style="width:80px; height:80px; margin-right:10px;">⚡</button>
</div> -->

<div id="gameOverOverlay" style="display:none;">
  <div id="gameOverText">GAME OVER</div>
  <div id="finalScore" style="font-size:20px; margin-top:10px;"></div>
  <button id="restartBtnOverlay">Restart</button>
</div>

<button id="restartBtn" style="display:none; position: absolute; left:50%; top:60%; transform: translateX(-50%); padding:10px 20px; font-size:16px;">
  Restart
</button>

<canvas id="gameCanvas"></canvas>

<div id="mobileControls">
  <button id="upBtnMobile">▲</button>
  <button id="downBtnMobile">▼</button>
  <button id="fireBtnMobile">⚡</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const baseWidth = 400;
const baseHeight = 400;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const bgImage = new Image();
bgImage.src = "space.png"; 
let bgY = 0; 
const playerImage = new Image();
playerImage.src = "alien_Fire2.png"; 
const enemyImage = new Image();
enemyImage.src = "enemy.png";
const missileImage = new Image();
missileImage.src = "missile2.png";
const powerUpImage = new Image();
powerUpImage.src = "power-up2.png"; 

let player = { x: 50, y: 180, width: 40, height: 50 };      
let bullets = [];
let enemies = [];
let enemyBullets = [];
let explosions = [];
let score = 0;
let playerHealth = 100;  
let gameOver = false; 

let powerUp = null;
let electricityUp = null;
let electricityActive = false;
let electricityFrames = 0;
let missilesActive = false;
let missiles = [];
let missileAmmo = 0;
let missileDuration = 60000; 

let upPressed = false;
let downPressed = false;
let firePressed = false;
let bulletCooldown = 0; 
const bulletDelay = 10;
let energyBursts = [];

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowUp') upPressed = true;
  if(e.key === 'ArrowDown') downPressed = true;
  if(e.key === ' ') firePressed = true;
});

document.addEventListener('keyup', (e) => {
  if(e.key === 'ArrowUp') upPressed = false;
  if(e.key === 'ArrowDown') downPressed = false;
  if(e.key === ' ') firePressed = false;
 });

function spawnEnemy() {
  enemies.push({ 
    x: baseWidth, 
    y: Math.random() * (baseHeight - 30),
    width:30, 
    height:30,
    maxHp: 30,
    hp: 30,
    speed: 0.5,
    slowed: false,
    slowTimer: 0
  });
}
setInterval(spawnEnemy, 1000);

function spawnPowerUps() {
  if (powerUp || electricityUp) return;

  if (score > 0 && score % 10 === 0 && score < 30) {
    powerUp = {
      x: 200,
      y: Math.random() * (baseHeight - 30),
      width: 20,
      height: 20,
      vy: Math.random() * 1.5 - 1  
    };
  } 
  else if (score === 30 && score % 15 === 0) {
    electricityUp = {
      x: 200,
      y: Math.random() * (baseHeight - 30),
      width: 25,
      height: 25,
      vy: Math.random() * 1.5 - 1
    };
  }
}


function update() {
  let lastMissileTime = 0;
  const missileInterval = 200; 

  if(upPressed) player.y -= 5;     
  if(downPressed) player.y += 5;

  player.y = Math.max(0, Math.min(baseHeight - player.height, player.y));

  if (firePressed && bulletCooldown <= 0) {
      bullets.push({
          x: player.x + player.width,
          y: player.y + player.height / 2,
          width: 5,
          height: 2
      });
      bulletCooldown = bulletDelay; 
  }

  if (bulletCooldown > 0) bulletCooldown--;

  spawnPowerUps();


  bullets.forEach(b => b.x += 30);

  enemies.forEach(e => {
    if(e.slowTimer > 0){
      e.slowTimer--;
    } else {
      e.slowed = false;
      e.speed = 0.5;
    }
    e.x -= e.speed;
  });

  enemyBullets.forEach(b => b.x -= 2); 
  enemyBullets = enemyBullets.filter(b => b.x > -20);


  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if(b.x < e.x + e.width && b.x + b.width > e.x &&
        b.y < e.y + e.height && b.y + b.height > e.y) {
          explosions.push({ x: e.x, y: e.y, size: 10, alpha: 1 });
          bullets.splice(bi,1);

          e.hp -= 25; 

          if(e.hp <= 0){
            enemies.splice(ei,1);
            score++;
          }
      }
    });
  });


    if (powerUp) {
      powerUp.y += powerUp.vy;
      if (powerUp.y < 0 || powerUp.y + powerUp.height > baseHeight) {
        powerUp.vy *= -1; 
      }

      for (let bi = bullets.length - 1; bi >= 0; bi--) { 
        let b = bullets[bi];
        if (b.x < powerUp.x + powerUp.width &&
            b.x + b.width > powerUp.x &&
            b.y < powerUp.y + powerUp.height &&
            b.y + b.height > powerUp.y) {

          bullets.splice(bi, 1);
          missilesActive = true;
          missileAmmo = 50;
          powerUp = null;          
          setTimeout(() => missilesActive = false, missileDuration);
          score++;
          break; 
        }
      }
    }

    if (electricityUp) {

      electricityUp.y += electricityUp.vy;
      if (electricityUp.y < 0 || electricityUp.y + electricityUp.height > baseHeight) {
        electricityUp.vy *= -1;
      }

      for (let bi = bullets.length - 1; bi >= 0; bi--) {
        let b = bullets[bi];
        if (b.x < electricityUp.x + electricityUp.width &&
            b.x + b.width > electricityUp.x &&
            b.y < electricityUp.y + electricityUp.height &&
            b.y + b.height > electricityUp.y) {

          bullets.splice(bi, 1);
          electricityActive = true;
          electricityFrames = 30000;
          electricityUp = null; 
          score++;
          break; 
        }
      }
    }


    if (electricityActive) {
      enemies = enemies.filter(enemy => {
        if (!enemy) return false;

        let startX = player.x + player.width / 2;
        let startY = player.y + player.height / 2;

        let endX = enemy.x + enemy.width / 2;
        let endY = enemy.y + enemy.height / 2;

        let dx = endX - startX;
        let dy = endY - startY;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < 500 ) {
          enemy.hp -= 0.06;
          enemy.slowed = true;
          enemy.speed = 0.2;
          enemy.slowTimer = 10;

          if (Math.random() < 0.2) {
            explosions.push({ x: enemy.x, y: enemy.y, size: 5, alpha: 1 });
          }
        }

        if (enemy.hp <= 0) {
          explosions.push({ x: enemy.x, y: enemy.y, size: 20, alpha: 1 });
          score++;
          return false;
        }

        return true;
      });

      electricityFrames--;
      if (electricityFrames <= 0) electricityActive = false;
    }


    if (missilesActive && missileAmmo > 0) {

      const availableTargets = enemies.filter(e => !missiles.some(m => m.target === e));

      if (availableTargets.length > 0) {
        const target = availableTargets[0]; 
        missiles.push({
          x: player.x + player.width,
          y: player.y + player.height / 2,
          width: 20,
          height: 10,
          target
        });
        missileAmmo--;
      }
    }


    missiles = missiles.filter(m => {

      if (!m.target || !enemies.includes(m.target)) return false;

      let dx = m.target.x - m.x;
      let dy = m.target.y - m.y;
      let dist = Math.sqrt(dx * dx + dy * dy);
      let speed = 6;
      m.x += speed * dx / dist;
      m.y += speed * dy / dist;

      if (
        m.x < m.target.x + m.target.width &&
        m.x + m.width > m.target.x &&
        m.y < m.target.y + m.target.height &&
        m.y + m.height > m.target.y
      ) {
        explosions.push({ x: m.target.x, y: m.target.y, size: 10, alpha: 1 });
        m.target.hp -= 20;
        if (m.target.hp <= 0) {
          enemies = enemies.filter(e => e !== m.target);
          score++;
        }

        return false; 
      }

      return true; 
    });

  bullets = bullets.filter(b => b.x < baseWidth);
  enemies = enemies.filter(e => e.x > -20);

  explosions.forEach((ex, index) => {
    ex.size += 2;
    ex.alpha -= 0.05;
    if(ex.alpha <= 0) explosions.splice(index,1);
  });

  enemies.forEach(e => {
    if(Math.random() < 0.01) { 
      enemyBullets.push({ x: e.x, y: e.y + e.height/2 - 5, width: 10, height: 5 });
    }
  });


  enemyBullets.forEach((b, bi) => {
    if(b.x < player.x + player.width && b.x + b.width > player.x &&
       b.y < player.y + player.height && b.y + b.height > player.y) {
         enemyBullets.splice(bi,1);
         playerHealth -= 10;
         if(playerHealth <= 0){ playerHealth = 0; gameOver = true; }
    }
  });

  explosions = explosions.map(ex => {
    ex.size += 2;
    ex.alpha -= 0.05;
    return ex;
  }).filter(ex => ex.alpha > 0);

  // if(electricityFrames > 0) electricityFrames--;
  // else electricityActive = false;
}


let bgX = 0;

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let scaleX = canvas.width / baseWidth;
  let scaleY = canvas.height / baseHeight;
  ctx.save();
  ctx.scale(scaleX, scaleY);

  ctx.drawImage(bgImage, bgX, 0, baseWidth, baseHeight);
  ctx.drawImage(bgImage, bgX + baseWidth, 0, baseWidth, baseHeight);

  bgX -= 1; 
  if (bgX <= -baseWidth) bgX = 0; 

  ctx.fillStyle = 'red'; ctx.fillRect(10,30,100,10);
  ctx.fillStyle = 'lime'; ctx.fillRect(10,30,playerHealth,10);
  ctx.strokeStyle = 'white'; ctx.strokeRect(10,30,100,10);


  ctx.drawImage(playerImage, player.x, player.y, player.width, player.height);

  ctx.fillStyle = 'yellow';
  bullets.forEach(b => ctx.fillRect(b.x,b.y,b.width,b.height));

  enemies.forEach(e => {
    ctx.drawImage(enemyImage, e.x, e.y, e.width, e.height);
    ctx.fillStyle = "red";
    ctx.fillRect(e.x, e.y - 8, e.width, 4);
    ctx.fillStyle = "lime";
    ctx.fillRect(e.x, e.y - 8, e.width * (e.hp / e.maxHp), 4);
  });

  ctx.fillStyle = 'orange';
  enemyBullets.forEach(b => ctx.fillRect(b.x,b.y,b.width,b.height));


  if(powerUp) ctx.drawImage(powerUpImage, powerUp.x, powerUp.y, powerUp.width, powerUp.height);
  if(electricityUp) ctx.drawImage(powerUpImage, electricityUp.x, electricityUp.y, electricityUp.width, electricityUp.height);


  missiles.forEach(m => ctx.drawImage(missileImage, m.x, m.y, m.width, m.height));
  explosions.forEach(ex => {
    ctx.beginPath();
    ctx.arc(ex.x + 10, ex.y + 10, ex.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255, 100, 0, ${ex.alpha})`;
    ctx.fill();
  });

  if(electricityActive){
    ctx.strokeStyle = 'cyan';
    ctx.lineWidth = 2;
    enemies.forEach(e => {
      let startX = player.x + player.width/2;
      let startY = player.y + player.height/2;
      let endX = e.x + e.width/2;
      let endY = e.y + e.height/2;
      let segments = 5;
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      for(let i=1; i<=segments; i++){
        let x = startX + (endX-startX)/segments*i + (Math.random()*10-5);
        let y = startY + (endY-startY)/segments*i + (Math.random()*10-5);
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    });
  }

  ctx.fillStyle = 'white';
  ctx.fillText('Score: ' + score, 10, 20);

  ctx.restore();
}

const gameOverOverlay = document.getElementById('gameOverOverlay');
const restartBtnOverlay = document.getElementById('restartBtnOverlay');
const finalScoreText = document.getElementById('finalScore');

function drawGameOver() {
  gameOverOverlay.style.display = 'flex';
  finalScoreText.textContent = 'Score: ' + score;
}


function loop() {
  if(!gameOver){ update(); draw(); requestAnimationFrame(loop); } 
  else { drawGameOver(); }
} 

loop();

const restartBtn = document.getElementById('restartBtn');
restartBtnOverlay.addEventListener('click', () => {
  player.x = 50; player.y = 180; bullets = []; enemies = []; enemyBullets = [];
  explosions = []; score = 0; playerHealth = 100; gameOver = false;
  powerUp = null; electricityUp = null; electricityActive = false;
  missilesActive = false; missiles = []; missileAmmo = 0;

  gameOverOverlay.style.display = 'none';

  loop();
});

const upBtnMobile = document.getElementById('upBtnMobile');
const downBtnMobile = document.getElementById('downBtnMobile');
const fireBtnMobile = document.getElementById('fireBtnMobile');

function addTouchControls(button, onPress, onRelease) {
  button.addEventListener('touchstart', (e) => {
    e.preventDefault();
    onPress();
  }, { passive: false });

  button.addEventListener('touchend', (e) => {
    e.preventDefault();
    onRelease();
  });
}

addTouchControls(upBtnMobile, () => upPressed = true, () => upPressed = false);
addTouchControls(downBtnMobile, () => downPressed = true, () => downPressed = false);
addTouchControls(fireBtnMobile, () => firePressed = true, () => firePressed = false);
</script>
</body>
</html>
