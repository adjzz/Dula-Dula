<!DOCTYPE html>
<html>
<head>
  <title>Space Impact Clone - Mobile Ready</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      touch-action: none; 
    }
    canvas {
      display: block;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    #controls > div, #controls > button {
      pointer-events: auto;
    }
    #restartBtn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 30px;
      font-size: 18px;
      z-index: 10;
      display: none;
    }
  </style>
</head>
<body>

<div id="controls">
  <div style="display:flex; flex-direction:column; margin-left:10px;">
    <button id="upBtn" style="width:60px; height:60px; margin-bottom:10px;">▲</button>
    <button id="downBtn" style="width:60px; height:60px;">▼</button>
  </div>
  <button id="fireBtn" style="width:80px; height:80px; margin-right:10px;">⚡</button>
</div>

<button id="restartBtn">Restart</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Images
const playerImage = new Image();
playerImage.src = "alien_Fire2.png"; 
const enemyImage = new Image();
enemyImage.src = "enemy.png";
const missileImage = new Image();
missileImage.src = "missile2.png";
const powerUpImage = new Image();
powerUpImage.src = "power-up2.png"; 

// Game variables
let player = { x: 50, y: canvas.height/2, width: 40, height: 50 };      
let bullets = [];
let enemies = [];
let enemyBullets = [];
let explosions = [];
let missiles = [];

let powerUp = null;
let electricityUp = null;
let electricityActive = false;
let electricityFrames = 0;
let missilesActive = false;
let missileAmmo = 0;
let missileDuration = 50000;

let score = 0;
let playerHealth = 100;
let gameOver = false;

// Mobile control states
let upPressed = false;
let downPressed = false;
let firePressed = false;

// Image load tracking
let imagesLoaded = 0;
[playerImage, enemyImage, missileImage, powerUpImage].forEach(img => {
  img.onload = () => {
    imagesLoaded++;
    if(imagesLoaded === 4) loop();
  }
});

// Keyboard controls
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowUp') upPressed = true;
  if(e.key === 'ArrowDown') downPressed = true;
  if(e.key === ' ') firePressed = true;
});
document.addEventListener('keyup', e => {
  if(e.key === 'ArrowUp') upPressed = false;
  if(e.key === 'ArrowDown') downPressed = false;
  if(e.key === ' ') firePressed = false;
});

// Mobile button controls
document.getElementById('upBtn').addEventListener('touchstart', () => upPressed = true);
document.getElementById('upBtn').addEventListener('touchend', () => upPressed = false);
document.getElementById('downBtn').addEventListener('touchstart', () => downPressed = true);
document.getElementById('downBtn').addEventListener('touchend', () => downPressed = false);
document.getElementById('fireBtn').addEventListener('touchstart', () => firePressed = true);
document.getElementById('fireBtn').addEventListener('touchend', () => firePressed = false);

// Spawn enemies
function spawnEnemy() {
  enemies.push({
    x: canvas.width,
    y: Math.random() * (canvas.height - 30),
    width: 30,
    height: 30,
    maxHp: 30,
    hp: 30,
    speed: 1 + Math.random() * 1.5,
    slowed: false,
    slowTimer: 0
  });
}
setInterval(() => { if(!gameOver) spawnEnemy(); }, 2000);

// Spawn power-ups
function spawnPowerUps() {
  if(!powerUp && score > 0 && score % 10 === 0 && score < 30) {
    powerUp = { 
      x: Math.random()*(canvas.width - 40) + 100, 
      y: Math.random()*(canvas.height - 20), 
      width: 20, height: 20 
    };
  }
  if(!electricityUp && score >= 30) {
    electricityUp = { 
      x: Math.random()*(canvas.width - 40) + 100, 
      y: Math.random()*(canvas.height - 25), 
      width: 25, height: 25 
    };
  }
}

// Update game logic
function update() {
  spawnPowerUps();

  // Player movement
  if(upPressed) player.y -= 8;
  if(downPressed) player.y += 8;
  player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

  // Shooting
  if(firePressed) {
    bullets.push({ x: player.x + player.width, y: player.y + player.height/2 - 2, width:5, height:2 });
  }

  // Bullets move
  bullets.forEach(b => b.x += 12);
  bullets = bullets.filter(b => b.x < canvas.width);

  // Enemy movement
  enemies.forEach(e => {
    if(e.slowTimer > 0){
      e.slowTimer--;
    } else {
      e.slowed = false;
      e.speed = 1 + Math.random() * 1.5;
    }
    e.x -= e.speed;
  });
  enemies = enemies.filter(e => e.x > -50);

  // Enemy shooting
  enemies.forEach(e => {
    if(Math.random() < 0.01) {
      enemyBullets.push({ x: e.x, y: e.y + e.height/2 - 5, width:10, height:5, speed:3 });
    }
  });
  enemyBullets.forEach(b => b.x -= b.speed);
  enemyBullets = enemyBullets.filter(b => b.x > -20);

  // Bullet collisions with enemies
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if(b.x < e.x + e.width && b.x + b.width > e.x &&
         b.y < e.y + e.height && b.y + b.height > e.y) {
        explosions.push({ x: e.x, y: e.y, size: 10, alpha: 1 });
        bullets.splice(bi, 1);
        e.hp -= 25;
        if(e.hp <= 0) {
          enemies.splice(ei, 1);
          score++;
        }
      }
    });
  });

  // Bullet collisions with power-ups
  if(powerUp){
    bullets.forEach((b, bi) => {
      if(b.x < powerUp.x + powerUp.width && b.x + b.width > powerUp.x &&
         b.y < powerUp.y + powerUp.height && b.y + b.height > powerUp.y) {
           bullets.splice(bi, 1);
           missilesActive = true;
           missileAmmo = 50;
           powerUp = null;
           setTimeout(() => missilesActive = false, missileDuration);
           score++;
      }
    });
  }
  if(electricityUp){
    bullets.forEach((b, bi) => {
      if(b.x < electricityUp.x + electricityUp.width && b.x + b.width > electricityUp.x &&
         b.y < electricityUp.y + electricityUp.height && b.y + b.height > electricityUp.y) {
           bullets.splice(bi, 1);
           electricityActive = true;
           electricityFrames = 30000;
           electricityUp = null;
           score++;
      }
    });
  }

  // Electricity effect
  if(electricityActive){
    enemies.forEach((e, index) => {
      let dx = e.x - player.x;
      let dy = e.y - player.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 500) {
        e.hp -= 0.2;
        e.slowed = true;
        e.speed = 0.5;
        e.slowTimer = 10;
        if(e.hp <= 0) {
          explosions.push({x: e.x, y: e.y, size:20, alpha:1});
          enemies.splice(index,1);
          score++;
        }
      }
    });
    electricityFrames--;
    if(electricityFrames <= 0) electricityActive = false;
  }

  // Enemy bullets hitting player
  enemyBullets.forEach((b, bi) => {
    if(b.x < player.x + player.width && b.x + b.width > player.x &&
       b.y < player.y + player.height && b.y + b.height > player.y) {
         enemyBullets.splice(bi,1);
         playerHealth -= 10;
         if(playerHealth <= 0) gameOver = true;
    }
  });

  // Explosions update
  explosions.forEach((ex, i) => {
    ex.size += 2;
    ex.alpha -= 0.05;
    if(ex.alpha <= 0) explosions.splice(i,1);
  });
}

// Draw game
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Health bar
  ctx.fillStyle = 'red';
  ctx.fillRect(10, 30, 100, 10);
  ctx.fillStyle = 'lime';
  ctx.fillRect(10, 30, playerHealth, 10);
  ctx.strokeStyle = 'white';
  ctx.strokeRect(10, 30, 100, 10);

  // Player
  ctx.drawImage(playerImage, player.x, player.y, player.width, player.height);

  // Bullets
  ctx.fillStyle = 'yellow';
  bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

  // Enemies
  enemies.forEach(e => {
    ctx.drawImage(enemyImage, e.x, e.y, e.width, e.height);
    ctx.fillStyle = 'red';
    ctx.fillRect(e.x, e.y - 6, e.width, 4);
    ctx.fillStyle = 'lime';
    ctx.fillRect(e.x, e.y - 6, e.width * (e.hp / e.maxHp), 4);
  });

  // Enemy bullets
  ctx.fillStyle = 'orange';
  enemyBullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

  // Power-ups
  if(powerUp) ctx.drawImage(powerUpImage, powerUp.x, powerUp.y, powerUp.width, powerUp.height);
  if(electricityUp){
    ctx.strokeStyle = 'cyan';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(electricityUp.x, electricityUp.y);
    ctx.lineTo(electricityUp.x + 20, electricityUp.y + 20);
    ctx.stroke();
  }

  // Explosions
  explosions.forEach(ex => {
    ctx.beginPath();
    ctx.arc(ex.x + 10, ex.y + 10, ex.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,100,0,${ex.alpha})`;
    ctx.fill();
  });

  // Electricity effect lines
  if(electricityActive){
    ctx.strokeStyle = 'cyan';
    ctx.lineWidth = 2;
    enemies.forEach(e => {
      ctx.beginPath();
      ctx.moveTo(player.x + player.width/2, player.y + player.height/2);
      ctx.lineTo(e.x + e.width/2, e.y + e.height/2);
      ctx.stroke();
    });
  }

  // Score
  ctx.fillStyle = 'white';
  ctx.font = '20px Arial';
  ctx.fillText('Score: ' + score, 10, 20);
}

// Game over screen
function drawGameOver() {
  ctx.fillStyle = 'white';
  ctx.font = '40px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
  ctx.font = '25px Arial';
  ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2 + 50);
  document.getElementById('restartBtn').style.display = 'block';
}

// Main loop
function loop() {
  if(!gameOver) {
    update();
    draw();
    requestAnimationFrame(loop);
  } else {
    drawGameOver();
  }
}

// Restart
document.getElementById('restartBtn').addEventListener('click', () => {
  player = { x: 50, y: canvas.height/2, width:40, height:50 };
  bullets = [];
  enemies = [];
  enemyBullets = [];
  explosions = [];
  missiles = [];
  powerUp = null;
  electricityUp = null;
  electricityActive = false;
  missilesActive = false;
  missileAmmo = 0;
  score = 0;
  playerHealth = 100;
  gameOver = false;
  document.getElementById('restartBtn').style.display = 'none';
  loop();
});
</script>
</body>
</html>
